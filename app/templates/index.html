<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сводный дашборд · amoCRM</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="viz-root">
  <div class="wrap">

    <header class="head">
      <div class="head__title">
        <h1>Сводный дашборд</h1>
        <p class="sub">План и факт по проектам · данные из amoCRM</p>
      </div>
      <div class="head__controls">
        <span id="status-badge" class="badge">…</span>
        <label class="field">
          <span>Месяц</span>
          <select id="month"></select>
        </label>
        <button id="refresh" class="icon-btn" title="Обновить">⟳</button>
      </div>
    </header>

    <!-- Герой: деньги в кассу факт vs план -->
    <section class="hero">
      <div class="hero__main">
        <div class="hero__label">Деньги в кассу · факт <span id="hero-month" class="muted"></span></div>
        <div class="hero__value" id="hero-cash">—</div>
        <div class="hero__meter">
          <div class="meter"><div class="meter__fill" id="hero-fill"></div></div>
          <div class="hero__meta">
            <span id="hero-pct" class="pct">—</span>
            <span class="muted">от плана <b id="hero-plan">—</b></span>
          </div>
        </div>
      </div>
      <div class="hero__side" id="hero-side"></div>
    </section>

    <!-- Стат-плитки -->
    <section class="tiles" id="tiles"></section>

    <!-- План / Факт сводно -->
    <section class="card">
      <div class="card__head"><h2>План / факт · сводно по проектам</h2></div>
      <div id="planfact" class="meters"></div>
    </section>

    <!-- Динамика -->
    <section class="card">
      <div class="card__head"><h2>Динамика · деньги в кассу по месяцам</h2></div>
      <div id="chart" class="chart"></div>
    </section>

    <!-- Редактирование планов -->
    <section class="card">
      <div class="card__head">
        <h2>Планы на месяц</h2>
        <span class="muted" id="plans-month"></span>
      </div>
      <div class="table-wrap">
        <table class="plans">
          <thead>
            <tr><th>Проект</th><th>Лиды</th><th>Продажи, шт</th><th>Выручка, ₽</th></tr>
          </thead>
          <tbody id="plans-body"></tbody>
          <tfoot id="plans-foot"></tfoot>
        </table>
      </div>
      <div class="plans__actions">
        <button id="plans-save" class="btn">Сохранить планы</button>
        <span id="plans-msg" class="muted"></span>
      </div>
    </section>

    <div id="error" class="error hidden"></div>

    <footer class="foot">Показатели считаются из amoCRM · настройка полей — в app/mapping.py</footer>
  </div>

  <div id="tooltip" class="tooltip hidden"></div>
  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
